name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  BuildPush:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build the backend Docker image
      run: docker build . --file backend/Dockerfile -t titorka/fow-backend --tag fow-bakend:$(date +%s)

    - name: Build the backend Docker image
      run: docker build . --file frontend/Dockerfile -t titorka/fow-frontend --tag fow-frontend:$(date +%s)

    - name: Push the fronend Docer image
      run: docker push titorka/fow-frontend

    - name: Push the backend Docer image
      run: docker push titorka/fow-backend

    - name: SSH into server and deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /path/to/app
          git pull
          docker compose down
          docker compose up -d
