name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Build and Push Backend
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push Backend
        run: |
          docker build . --file backend/Dockerfile \
            --tag titorka/fow-backend:latest \
            --tag titorka/fow-backend:${{ github.sha }}
          docker push titorka/fow-backend --all-tags

  # 2. Build and Push Frontend
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push Frontend
        run: |
          docker build . --file frontend/Dockerfile \
            --tag titorka/fow-frontend:latest \
            --tag titorka/fow-frontend:${{ github.sha }}
          docker push titorka/fow-frontend --all-tags

  # 3. SSH and Deploy (Waits for Backend and Frontend to finish)
  deploy:
    name: Deploy to Server
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/hack-compose
            docker-compose pull
            docker-compose down
            docker-compose up -d --remove-orphans
